<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>월간 등가률 표</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="shell">
        <section class="panel controls">
            <div class="controls-top">
                <div class="field">
                    <label for="reference-date">기준일</label>
                    <input id="reference-date" type="date">
                </div>
                <div class="action-row">
                    <button class="btn-primary" id="apply-btn" type="button">조회</button>
                    <button class="btn-secondary" id="reset-btn" type="button">기본 종목</button>
                    <button class="btn-secondary" id="refresh-btn" type="button">새로고침</button>
                </div>
            </div>
        </section>

        <section class="panel table-panel">
            <div class="table-head">
                <div>
                    <h1>월간 등가률 표</h1>
                    <p id="table-description">선택한 기준일이 속한 월의 거래일만 역순으로 보여줍니다. 각 칸은 일별 등가률입니다.</p>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <div class="empty-state" id="empty-state">기준일과 종목을 불러오면 여기에 날짜 / KOSPI / 주식1~주식7 등가률 표가 표시됩니다.</div>
        </section>
    </div>

    <datalist id="stock-catalog-list"></datalist>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
</body>
</html>
